<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#090a0b" />
    <title>Sem conexão — Orlando Queue Tracker</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #090a0b;
        color: #f3f3f5;
      }

      * { box-sizing: border-box; }

      body {
        min-width: 320px;
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding:
          calc(28px + env(safe-area-inset-top))
          calc(24px + env(safe-area-inset-right))
          calc(28px + env(safe-area-inset-bottom))
          calc(24px + env(safe-area-inset-left));
        background:
          radial-gradient(circle at 50% 10%, rgba(10, 132, 255, .18), transparent 22rem),
          #090a0b;
      }

      main {
        width: min(100%, 420px);
        padding: 36px 28px;
        border: 1px solid rgba(255, 255, 255, .09);
        border-radius: 28px;
        text-align: center;
        background: rgba(23, 24, 27, .9);
        box-shadow: 0 30px 80px rgba(0, 0, 0, .35);
      }

      .mark {
        width: 72px;
        height: 72px;
        margin: 0 auto 22px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(100, 210, 255, .24);
        border-radius: 22px;
        color: #64d2ff;
        background: rgba(100, 210, 255, .08);
      }

      svg { width: 42px; height: 42px; }
      h1 { margin: 0; font-size: 28px; letter-spacing: -.04em; }
      p { margin: 14px 0 24px; color: #a4a6ad; line-height: 1.55; }

      button {
        min-height: 48px;
        padding: 0 22px;
        border: 0;
        border-radius: 15px;
        color: #071018;
        font: inherit;
        font-weight: 750;
        background: #64d2ff;
        cursor: pointer;
      }

      button:focus-visible { outline: 3px solid white; outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none">
          <path d="M6 31c7-1 8-13 16-13 7 0 7 10 14 10 3 0 5-2 6-4" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M8 37h32M12 29v8M21 20v17M31 27v10M39 25v12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity=".65"/>
        </svg>
      </div>
      <h1>Você está offline</h1>
      <p>As filas ao vivo precisam de conexão. Assim que a internet voltar, tente carregar o app novamente.</p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
